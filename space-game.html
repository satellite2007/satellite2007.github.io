<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>星际防线</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f2f6f7;
      --muted: #98a8ae;
      --cyan: #50e3c2;
      --amber: #ffb84c;
      --danger: #ff5f57;
      --panel: rgba(12, 22, 27, .82);
      --line: rgba(158, 210, 218, .19);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background: #03080b;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "PingFang SC", system-ui, sans-serif;
      letter-spacing: 0;
      touch-action: none;
      user-select: none;
    }
    button { font: inherit; color: inherit; }
    #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .noise {
      position: fixed; inset: 0; pointer-events: none; opacity: .15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.25'/%3E%3C/svg%3E");
    }
    .hud { position: fixed; inset: 0; pointer-events: none; }
    .topbar {
      position: absolute; top: max(18px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      width: min(94vw, 1120px); display: grid; grid-template-columns: 1fr auto 1fr; align-items: start;
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-mark { width: 28px; height: 28px; position: relative; transform: rotate(45deg); border: 2px solid var(--cyan); }
    .brand-mark::after { content: ""; position: absolute; inset: 6px; background: var(--cyan); }
    .brand strong { display:block; font-size: 14px; letter-spacing: 2px; }
    .brand span { display:block; font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 1.5px; }
    .score { text-align: center; }
    .score small { display:block; color:var(--muted); font-size:10px; letter-spacing:2px; }
    .score strong { display:block; font: 700 30px/1.15 ui-monospace, Consolas, monospace; }
    .actions { justify-self: end; display:flex; gap:8px; pointer-events:auto; }
    .icon-btn {
      width: 38px; height: 38px; border: 1px solid var(--line); background: rgba(8,17,21,.66); border-radius: 4px;
      display:grid; place-items:center; cursor:pointer; transition:.18s ease;
    }
    .icon-btn:hover { border-color: var(--cyan); background: rgba(22,45,47,.78); }
    .icon-btn svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; }
    .status {
      position:absolute; left: max(20px, calc((100vw - 1120px)/2)); bottom:max(24px, env(safe-area-inset-bottom));
      width:min(270px, 40vw);
    }
    .status-row { display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:11px; margin-bottom:7px; }
    .status-row b { color:var(--ink); font:600 12px ui-monospace, monospace; }
    .meter { height:5px; background:rgba(255,255,255,.1); overflow:hidden; }
    .meter i { display:block; width:100%; height:100%; background:var(--cyan); transition:width .18s; }
    .wave {
      position:absolute; right:max(20px, calc((100vw - 1120px)/2)); bottom:max(24px, env(safe-area-inset-bottom));
      text-align:right; color:var(--muted); font-size:11px;
    }
    .wave b { display:block; color:var(--amber); font:700 22px ui-monospace, monospace; margin-top:3px; }
    .overlay {
      position:fixed; inset:0; display:grid; place-items:center; padding:22px; background:rgba(1,6,8,.46);
      backdrop-filter:blur(5px); transition:opacity .25s; z-index:4;
    }
    .overlay.hidden { opacity:0; pointer-events:none; }
    .panel {
      width:min(520px, 94vw); padding:36px 34px 30px; background:var(--panel); border:1px solid var(--line);
      border-top:3px solid var(--cyan); border-radius:6px; box-shadow:0 30px 80px rgba(0,0,0,.5);
    }
    .eyebrow { color:var(--cyan); font-size:11px; letter-spacing:3px; margin-bottom:12px; }
    h1 { font-size:clamp(30px, 7vw, 56px); line-height:1; margin:0 0 13px; font-weight:800; }
    .subtitle { margin:0; color:var(--muted); font-size:14px; line-height:1.7; }
    .controls { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:26px 0 24px; }
    .control { border-top:1px solid var(--line); padding-top:12px; }
    .control b { display:block; font-size:12px; margin-bottom:5px; }
    .control span { color:var(--muted); font-size:11px; }
    .primary {
      width:100%; min-height:49px; border:0; border-radius:4px; background:var(--cyan); color:#03211b;
      font-weight:800; cursor:pointer; transition:transform .15s, filter .15s;
    }
    .primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .best { text-align:center; color:var(--muted); font-size:11px; margin-top:14px; }
    .best b { color:var(--amber); }
    .menu-actions { display:grid; gap:10px; margin-top:25px; }
    .menu-btn { min-height:54px; border:1px solid var(--line); border-radius:4px; background:rgba(255,255,255,.045); text-align:left; padding:0 16px; cursor:pointer; transition:.15s; }
    .menu-btn:hover { border-color:var(--cyan); background:rgba(80,227,194,.08); }
    .menu-btn b { display:block; font-size:14px; }
    .menu-btn span { display:block; color:var(--muted); font-size:10px; margin-top:3px; }
    .secondary { width:100%; min-height:44px; border:1px solid var(--line); border-radius:4px; background:transparent; cursor:pointer; }
    .levels { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:22px 0; }
    .level { aspect-ratio:1; border:1px solid var(--line); border-radius:4px; background:rgba(255,255,255,.045); display:grid; place-items:center; cursor:pointer; }
    .level:disabled { opacity:.35; cursor:not-allowed; }
    .level b { display:block; font:700 18px ui-monospace,monospace; }
    .level span { display:block; color:var(--amber); font-size:11px; min-height:14px; }
    .result-stars { font-size:42px; color:rgba(255,255,255,.18); letter-spacing:8px; margin:20px 0 8px; }
    .result-stars .on { color:var(--amber); }
    .result-line { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; padding:9px 0; border-bottom:1px solid var(--line); }
    .result-line b { color:var(--ink); }
    .effects { position:absolute; left:50%; top:84px; transform:translateX(-50%); display:flex; gap:6px; }
    .effect { background:rgba(8,17,21,.72); border:1px solid var(--line); padding:5px 8px; border-radius:3px; color:var(--cyan); font:10px ui-monospace,monospace; }
    .touch { position:fixed; inset:auto 0 max(18px, env(safe-area-inset-bottom)); display:none; justify-content:space-between; padding:0 18px; pointer-events:none; z-index:3; }
    .touch-pad { display:flex; gap:8px; pointer-events:auto; }
    .touch button { width:58px; height:58px; border:1px solid var(--line); border-radius:50%; background:rgba(8,18,22,.55); backdrop-filter:blur(4px); touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; }
    .touch .fire { width:72px; height:72px; color:var(--amber); border-color:rgba(255,184,76,.45); font-size:11px; font-weight:800; }
    @media (hover:none), (pointer:coarse) {
      .touch { display:flex; }
      .status, .wave { bottom:100px; }
    }
    @media (max-width:620px) {
      .topbar { grid-template-columns:1fr auto; }
      .brand span { display:none; }
      .score { position:absolute; top:50px; left:0; text-align:left; }
      .score strong { font-size:24px; }
      .panel { padding:28px 22px 24px; }
      .controls { gap:7px; }
      .status { width:44vw; left:18px; }
      .wave { right:18px; }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="飞船打陨石游戏"></canvas>
  <div class="noise"></div>
  <main class="hud">
    <div class="topbar">
      <div class="brand"><i class="brand-mark"></i><div><strong>星际防线</strong><span>ORBITAL DEFENSE</span></div></div>
      <div class="score"><small id="missionLabel">作战积分</small><strong id="score">000000</strong></div>
      <div class="actions">
        <button class="icon-btn" id="sound" title="切换音效" aria-label="切换音效"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path id="soundWaves" d="M15 9a4 4 0 0 1 0 6m3-9a8 8 0 0 1 0 12"/></svg></button>
        <button class="icon-btn" id="pause" title="暂停" aria-label="暂停"><svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg></button>
      </div>
    </div>
    <div class="status"><div class="status-row"><span>护盾完整度</span><b id="hpText">100%</b></div><div class="meter"><i id="hpBar"></i></div></div>
    <div class="wave">当前波次<b id="wave">WAVE 01</b></div>
    <div class="effects" id="effects"></div>
  </main>
  <div class="touch" aria-label="触屏控制">
    <div class="touch-pad"><button data-key="ArrowLeft" aria-label="向左">◀</button><button data-key="ArrowRight" aria-label="向右">▶</button></div>
    <button class="fire" id="touchFire" aria-label="自动开火">自动开火</button>
  </div>
  <section class="overlay" id="overlay">
    <div class="panel" id="menuBody"></div>
  </section>
  <script>
  (() => {
    const canvas = document.querySelector('#game'), ctx = canvas.getContext('2d');
    const $ = s => document.querySelector(s);
    const ui = { score:$('#score'), hp:$('#hpText'), hpBar:$('#hpBar'), wave:$('#wave'), overlay:$('#overlay'), mission:$('#missionLabel'), effects:$('#effects'), menu:$('#menuBody') };
    let W=0,H=0,dpr=1,last=0,running=false,paused=false,score=0,hp=100,wave=1,spawnTimer=0,screenShake=0,soundOn=true,audio;
    let mode='endless',campaignLevel=1,kills=0,timeLeft=0,levelEnded=false;
    const keys={}, bullets=[], rocks=[], particles=[], powerups=[], stars=[];
    const mobileAutoFire=matchMedia('(hover:none), (pointer:coarse)').matches||navigator.maxTouchPoints>0;
    const effects={laser:0,rapid:0,power:0,multi:0};
    const LEVELS=[
      {duration:35,stars:[6,11,17],rate:1.12},{duration:38,stars:[9,15,22],rate:1.02},{duration:40,stars:[12,19,27],rate:.94},{duration:42,stars:[15,23,32],rate:.86},
      {duration:44,stars:[18,27,37],rate:.79},{duration:45,stars:[21,31,42],rate:.72},{duration:46,stars:[24,35,47],rate:.66},{duration:48,stars:[28,40,54],rate:.6}
    ];
    let ship={x:0,y:0,vx:0,fire:0,invuln:0};
    const rand=(a,b)=>a+Math.random()*(b-a), clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const bestScore=()=>Number(localStorage.getItem('orbital-best')||0);
    const campaignStars=()=>{try{return JSON.parse(localStorage.getItem('orbital-campaign-stars')||'[]')}catch(_){return[]}};

    function renderHome(){
      ui.menu.innerHTML=`<div class="eyebrow">ORBITAL DEFENSE</div><h1>星际防线</h1><p class="subtitle">拦截陨石群，收集武器模块，守住近地轨道。</p><div class="menu-actions"><button class="primary" data-action="modes">PLAY</button></div><div class="best">最高记录：<b>${String(bestScore()).padStart(6,'0')}</b></div>`;
      ui.overlay.classList.remove('hidden');
    }
    function renderModes(){
      ui.menu.innerHTML=`<div class="eyebrow">SELECT OPERATION</div><h1>选择模式</h1><div class="menu-actions"><button class="menu-btn" data-action="campaign"><b>闯关模式</b><span>完成限时击杀目标，赢得星级并解锁战区</span></button><button class="menu-btn" data-action="endless"><b>无尽模式</b><span>持续迎战不断增强的陨石波次</span></button><button class="secondary" data-action="home">返回</button></div>`;
    }
    function renderLevels(){
      const saved=campaignStars();let html='';LEVELS.forEach((l,i)=>{const unlocked=i===0||(saved[i-1]||0)>=1,s=saved[i]||0;html+=`<button class="level" data-level="${i+1}" ${unlocked?'':'disabled'}><div><b>${String(i+1).padStart(2,'0')}</b><span>${unlocked?'★'.repeat(s)+'☆'.repeat(3-s):'LOCK'}</span></div></button>`});
      ui.menu.innerHTML=`<div class="eyebrow">CAMPAIGN SECTORS</div><h1>选择战区</h1><p class="subtitle">至少获得一颗星，才可解锁下一战区。</p><div class="levels">${html}</div><button class="secondary" data-action="modes">返回</button>`;
    }
    function renderPause(){ui.menu.innerHTML=`<div class="eyebrow">SYSTEM PAUSED</div><h1>任务暂停</h1><p class="subtitle">拦截系统已待机。</p><div class="menu-actions"><button class="primary" data-action="resume">继续任务</button><button class="secondary" data-action="quit">返回主菜单</button></div>`;ui.overlay.classList.remove('hidden')}
    function renderResult(starCount,failed=false){
      const cfg=LEVELS[campaignLevel-1],starsHtml=[0,1,2].map(i=>`<span class="${i<starCount?'on':''}">★</span>`).join('');
      ui.menu.innerHTML=`<div class="eyebrow">MISSION REPORT / SECTOR ${String(campaignLevel).padStart(2,'0')}</div><h1>${starCount?'任务完成':'尚未达标'}</h1><div class="result-stars">${starsHtml}</div><div class="result-line"><span>击毁陨石</span><b>${kills}</b></div><div class="result-line"><span>一星目标</span><b>${cfg.stars[0]}</b></div><div class="menu-actions">${starCount&&campaignLevel<LEVELS.length?'<button class="primary" data-action="next">下一战区</button>':'<button class="primary" data-action="retry">再次挑战</button>'}<button class="secondary" data-action="levels">战区选择</button></div>`;
      ui.overlay.classList.remove('hidden');
    }

    function resize(){
      dpr=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
      canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0);
      ship.y=H-110; if(!ship.x) ship.x=W/2;
      if(!stars.length) for(let i=0;i<140;i++) stars.push({x:Math.random()*W,y:Math.random()*H,z:rand(.2,1.2)});
    }
    addEventListener('resize',resize); resize();
    function tone(freq,dur=.06,type='square',vol=.025){
      if(!soundOn)return; audio ||= new (window.AudioContext||window.webkitAudioContext)();
      const o=audio.createOscillator(),g=audio.createGain(); o.type=type;o.frequency.setValueAtTime(freq,audio.currentTime);g.gain.setValueAtTime(vol,audio.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+dur);
    }
    function reset(){
      bullets.length=rocks.length=particles.length=powerups.length=0; score=0;hp=100;wave=mode==='campaign'?campaignLevel:1;spawnTimer=0;screenShake=0;kills=0;levelEnded=false;
      Object.keys(effects).forEach(k=>effects[k]=0);timeLeft=mode==='campaign'?LEVELS[campaignLevel-1].duration:0;
      ship={x:W/2,y:H-110,vx:0,fire:0,invuln:0}; updateUI();
    }
    function start(nextMode='endless',level=1){mode=nextMode;campaignLevel=level;reset();running=true;paused=false;ui.overlay.classList.add('hidden');last=performance.now();requestAnimationFrame(loop);tone(220,.15,'sine',.04); }
    function updateUI(){
      ui.score.textContent=mode==='campaign'?String(Math.max(0,Math.ceil(timeLeft))).padStart(2,'0')+'s':String(score).padStart(6,'0');ui.mission.textContent=mode==='campaign'?`战区 ${String(campaignLevel).padStart(2,'0')} · 击毁 ${kills}`:'作战积分';
      ui.hp.textContent=hp+'%';ui.hpBar.style.width=hp+'%';ui.hpBar.style.background=hp<35?'var(--danger)':'var(--cyan)';ui.wave.textContent=mode==='campaign'?'TARGET '+LEVELS[campaignLevel-1].stars[0]:'WAVE '+String(wave).padStart(2,'0');
      const names={laser:'激光炮',rapid:'高速射击',power:'威力强化',multi:'三联炮'};ui.effects.innerHTML=Object.entries(effects).filter(([,v])=>v>0).map(([k,v])=>`<span class="effect">${names[k]} ${Math.ceil(v)}s</span>`).join('');
    }
    function burst(x,y,color,count=12,speed=180){ for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=rand(speed*.25,speed);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.25,.7),max:1,color,size:rand(1,4)});} }
    function fire(){
      if(effects.laser>0){tone(520,.035,'sawtooth',.012);return;}
      const xs=effects.multi>0?[-15,0,15]:[0];xs.forEach(dx=>bullets.push({x:ship.x+dx,y:ship.y-26,prevY:ship.y-26,vy:-720,damage:effects.power>0?2:1}));tone(430,.045,'square',.018);
    }
    function spawnRock(){
      const r=rand(18,46), tough=r>35?2:1;
      const difficulty=mode==='campaign'?campaignLevel:wave;rocks.push({x:rand(r,W-r),y:-r-10,r,vx:rand(-35,35),vy:rand(82,126)+difficulty*7,rot:rand(0,6),spin:rand(-1.3,1.3),hp:tough,max:tough,laserTick:0,shape:Array.from({length:9},()=>rand(.78,1.08))});
    }
    function spawnPowerup(x,y){if(Math.random()>.22)return;const types=['laser','rapid','power','multi'],type=types[Math.floor(Math.random()*types.length)];powerups.push({x,y,vy:70,type,rot:0})}
    function activatePowerup(p){const durations={laser:6,rapid:8,power:10,multi:9};effects[p.type]=durations[p.type];burst(p.x,p.y,'#50e3c2',20,170);tone(680,.18,'sine',.04);updateUI()}
    function gameOver(){
      running=false;if(mode==='campaign'){finishCampaign();return}const best=Math.max(score,bestScore());localStorage.setItem('orbital-best',best);ui.menu.innerHTML=`<div class="eyebrow">ENDLESS REPORT</div><h1>防线失守</h1><p class="subtitle">本次获得 ${score} 分，抵挡至第 ${wave} 波。</p><div class="menu-actions"><button class="primary" data-action="endless">重新出击</button><button class="secondary" data-action="home">返回主菜单</button></div>`;ui.overlay.classList.remove('hidden');tone(90,.5,'sawtooth',.05);
    }
    function finishCampaign(){if(levelEnded)return;levelEnded=true;running=false;const cfg=LEVELS[campaignLevel-1];let earned=kills>=cfg.stars[2]?3:kills>=cfg.stars[1]?2:kills>=cfg.stars[0]?1:0;const saved=campaignStars();saved[campaignLevel-1]=Math.max(saved[campaignLevel-1]||0,earned);localStorage.setItem('orbital-campaign-stars',JSON.stringify(saved));renderResult(earned);tone(earned?520:90,.45,earned?'sine':'sawtooth',.05)}
    function resume(){paused=false;ui.overlay.classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}
    function togglePause(){if(!running)return;paused=!paused;paused?renderPause():resume()}
    function update(dt){
      if(mode==='endless')wave=1+Math.floor(score/1200);else{timeLeft-=dt;if(timeLeft<=0){timeLeft=0;updateUI();finishCampaign();return}}
      ship.fire-=dt;ship.invuln-=dt;screenShake=Math.max(0,screenShake-dt*18);Object.keys(effects).forEach(k=>effects[k]=Math.max(0,effects[k]-dt));
      const move=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0);
      const targetSpeed=move*460;
      ship.vx+=(targetSpeed-ship.vx)*Math.min(1,dt*(move?14:20));
      ship.x=clamp(ship.x+ship.vx*dt,30,W-30);
      const firing=keys.Space||keys.KeyJ||mobileAutoFire;if(firing&&ship.fire<=0){fire();ship.fire=effects.laser>0?.08:effects.rapid>0?.075:.17;}
      spawnTimer-=dt;if(spawnTimer<=0){spawnRock();const base=mode==='campaign'?LEVELS[campaignLevel-1].rate:Math.max(.3,1.18-wave*.05);spawnTimer=base*rand(.78,1.16);}
      stars.forEach(s=>{s.y+=25*s.z*dt;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
      bullets.forEach(b=>{b.prevY=b.y;b.y+=b.vy*dt}); rocks.forEach(r=>{r.x+=r.vx*dt;r.y+=r.vy*dt;r.rot+=r.spin*dt;r.laserTick-=dt});powerups.forEach(p=>{p.y+=p.vy*dt;p.rot+=dt*2});
      particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt;});
      for(let i=powerups.length-1;i>=0;i--){const p=powerups[i];let hit=false;
        for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(Math.abs(b.x-p.x)<22&&Math.min(b.y,b.prevY)<p.y+22&&Math.max(b.y,b.prevY)>p.y-22){bullets.splice(j,1);hit=true;break}}
        if(!hit&&effects.laser>0&&firing&&Math.abs(ship.x-p.x)<15)hit=true;
        if(hit){activatePowerup(p);powerups.splice(i,1)}else if(p.y>H+30)powerups.splice(i,1);
      }
      for(let i=rocks.length-1;i>=0;i--){ const r=rocks[i];
        if(effects.laser>0&&firing&&Math.abs(ship.x-r.x)<r.r*.55+8&&r.y<ship.y&&r.laserTick<=0){r.hp-=2;r.laserTick=.16;burst(r.x,r.y,'#50e3c2',5,90);screenShake=2;if(r.hp<=0){score+=Math.round(r.r*3);kills++;spawnPowerup(r.x,r.y);burst(r.x,r.y,'#ffb84c',18,230);rocks.splice(i,1);updateUI();continue}}
        for(let j=bullets.length-1;j>=0;j--){
          const b=bullets[j], top=Math.min(b.y,b.prevY), bottom=Math.max(b.y,b.prevY), hitRadius=r.r+7;
          const nearestY=clamp(r.y,top,bottom);
          if((b.x-r.x)**2+(nearestY-r.y)**2<hitRadius*hitRadius){
            bullets.splice(j,1);r.hp-=b.damage||1;burst(b.x,nearestY,'#50e3c2',8,110);screenShake=2;tone(180,.06,'square',.025);
            if(r.hp<=0){score+=Math.round(r.r*3);kills++;spawnPowerup(r.x,r.y);burst(r.x,r.y,'#ffb84c',18,230);rocks.splice(i,1);screenShake=4;tone(120,.12,'sawtooth',.03);updateUI();}
            break;
          }
        }
        if(!rocks.includes(r))continue;
        if((r.x-ship.x)**2+(r.y-ship.y)**2<(r.r+20)**2 && ship.invuln<=0){hp=Math.max(0,hp-18);ship.invuln=1.4;rocks.splice(i,1);burst(ship.x,ship.y,'#ff5f57',25,260);screenShake=12;updateUI();if(hp<=0){gameOver();return;}}
        else if(r.y-r.r>H){rocks.splice(i,1);hp=Math.max(0,hp-6);screenShake=7;updateUI();if(hp<=0){gameOver();return;}}
      }
      for(let i=bullets.length-1;i>=0;i--)if(bullets[i].y<-20)bullets.splice(i,1);
      for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);
      updateUI();
    }
    function drawShip(){
      const blink=ship.invuln>0&&Math.floor(ship.invuln*12)%2===0;if(blink)return;ctx.save();ctx.translate(ship.x,ship.y);
      const flame=rand(14,25);ctx.beginPath();ctx.moveTo(-7,16);ctx.lineTo(0,16+flame);ctx.lineTo(7,16);ctx.fillStyle='#ffb84c';ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(22,20);ctx.lineTo(7,15);ctx.lineTo(0,22);ctx.lineTo(-7,15);ctx.lineTo(-22,20);ctx.closePath();ctx.fillStyle='#d9e4e5';ctx.fill();ctx.strokeStyle='#50e3c2';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(6,6);ctx.lineTo(-6,6);ctx.closePath();ctx.fillStyle='#143d45';ctx.fill();ctx.restore();
    }
    function drawRock(r){ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.rot);ctx.beginPath();r.shape.forEach((n,i)=>{const a=i/r.shape.length*Math.PI*2,x=Math.cos(a)*r.r*n,y=Math.sin(a)*r.r*n;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.closePath();ctx.fillStyle='#3a3e3d';ctx.fill();ctx.strokeStyle=r.hp<r.max?'#ffb84c':'#79817f';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(-r.r*.22,-r.r*.12,r.r*.18,0,7);ctx.strokeStyle='#242827';ctx.stroke();ctx.restore();}
    function drawPowerup(p){const colors={laser:'#ff5f57',rapid:'#50e3c2',power:'#ffb84c',multi:'#8eb8ff'},labels={laser:'L',rapid:'R',power:'P',multi:'M'};ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.shadowColor=colors[p.type];ctx.shadowBlur=16;ctx.fillStyle='rgba(8,18,22,.9)';ctx.strokeStyle=colors[p.type];ctx.lineWidth=3;ctx.fillRect(-17,-17,34,34);ctx.strokeRect(-17,-17,34,34);ctx.rotate(-p.rot);ctx.fillStyle=colors[p.type];ctx.font='700 15px ui-monospace,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[p.type],0,1);ctx.restore();ctx.shadowBlur=0}
    function draw(){
      ctx.save();if(screenShake)ctx.translate(rand(-screenShake,screenShake),rand(-screenShake,screenShake));
      const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#061014');bg.addColorStop(1,'#020609');ctx.fillStyle=bg;ctx.fillRect(-20,-20,W+40,H+40);
      ctx.strokeStyle='rgba(73,145,151,.055)';ctx.lineWidth=1;for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
      stars.forEach(s=>{ctx.fillStyle=`rgba(205,238,240,${.25+s.z*.45})`;ctx.fillRect(s.x,s.y,s.z*1.5,s.z*1.5)});
      bullets.forEach(b=>{ctx.fillStyle=b.damage>1?'#ffb84c':'#50e3c2';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.fillRect(b.x-(b.damage>1?4:2),b.y-11,b.damage>1?8:4,16);ctx.shadowBlur=0});
      if(effects.laser>0&&(keys.Space||keys.KeyJ||mobileAutoFire)){ctx.save();ctx.globalAlpha=.75;ctx.strokeStyle='#ff5f57';ctx.shadowColor='#ff5f57';ctx.shadowBlur=22;ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(ship.x,ship.y-24);ctx.lineTo(ship.x,0);ctx.stroke();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.restore()}
      rocks.forEach(drawRock);powerups.forEach(drawPowerup);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life*1.8);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size)});ctx.globalAlpha=1;drawShip();ctx.restore();
    }
    function loop(t){if(!running||paused)return;const dt=Math.min((t-last)/1000,.033);last=t;update(dt);draw();if(running)requestAnimationFrame(loop);}
    addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();if((e.code==='KeyP'||e.code==='Escape')&&!e.repeat)togglePause();});
    addEventListener('keyup',e=>keys[e.code]=false);
    document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key;b.addEventListener('pointerdown',e=>{e.preventDefault();keys[k]=true;try{b.setPointerCapture(e.pointerId)}catch(_){}});b.addEventListener('pointerup',e=>{e.preventDefault();keys[k]=false});b.addEventListener('pointercancel',()=>keys[k]=false);b.addEventListener('touchend',()=>keys[k]=false,{passive:true})});
    const touchFire=$('#touchFire');let touchFireTimer=0,lastTouchShot=0;
    function shootFromTouch(e){
      if(e?.cancelable)e.preventDefault();
      if(!running||paused)return;
      const now=performance.now();
      if(now-lastTouchShot>130){fire();ship.fire=.17;lastTouchShot=now;}
    }
    function beginTouchFire(e){shootFromTouch(e);keys.Space=true;clearInterval(touchFireTimer);touchFireTimer=setInterval(()=>shootFromTouch(),170)}
    function endTouchFire(e){if(e?.cancelable)e.preventDefault();keys.Space=false;clearInterval(touchFireTimer);touchFireTimer=0}
    touchFire.addEventListener('touchstart',beginTouchFire,{passive:false});
    touchFire.addEventListener('touchend',endTouchFire,{passive:false});
    touchFire.addEventListener('touchcancel',endTouchFire,{passive:false});
    touchFire.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')beginTouchFire(e)});
    touchFire.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')endTouchFire(e)});
    touchFire.addEventListener('pointercancel',endTouchFire);
    touchFire.addEventListener('click',shootFromTouch);
    ui.menu.addEventListener('click',e=>{const button=e.target.closest('button');if(!button||button.disabled)return;const action=button.dataset.action,level=Number(button.dataset.level||0);
      if(level){start('campaign',level);return}
      if(action==='home')renderHome();else if(action==='modes')renderModes();else if(action==='campaign'||action==='levels')renderLevels();else if(action==='endless')start('endless');else if(action==='resume')resume();else if(action==='quit'){running=false;paused=false;Object.keys(keys).forEach(k=>keys[k]=false);renderHome()}else if(action==='retry')start('campaign',campaignLevel);else if(action==='next')start('campaign',Math.min(LEVELS.length,campaignLevel+1));
    });
    $('#pause').addEventListener('click',togglePause);$('#sound').addEventListener('click',()=>{soundOn=!soundOn;$('#soundWaves').style.display=soundOn?'':'none';tone(300)});
    renderHome();draw();
  })();
  </script>
</body>
</html>
