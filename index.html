    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding: 0 12px 30px;
    user-select: none;
    -webkit-user-select: none;
  }
  .app-header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 18px 0 10px;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #e74c3c;
    letter-spacing: 2px;
  }
  .app-header p {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
  }
  .meal-tabs {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 0 12px;
  }
  .meal-tab {
    flex: 0 0 auto;
    min-width: 70px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #f0d5c0;
    background: #fffaf5;
    font-size: 15px;
    font-weight: 600;
    color: #8b6f5e;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }
  .meal-tab .tab-icon {
    display: block;
    font-size: 20px;
    margin-bottom: 2px;
  }
  .meal-tab .tab-label {
    font-size: 13px;
  }
  .meal-tab.active {
    border-color: #e74c3c;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    box-shadow: 0 4px 12px rgba(231, 76, 60, 0.35);
  }
  .meal-tab:active { transform: scale(0.95); }
  .category-section {
    width: 100%;
    max-width: 420px;
    padding: 4px 0 8px;
  }
  .category-section .section-label {
    font-size: 12px;
    color: #b89880;
    padding: 0 4px 6px;
    font-weight: 500;
  }
  .category-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 2px;
  }
  .category-tag {
    padding: 5px 14px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 1.5px solid #e0d0c4;
    background: #fffcf8;
    color: #8b6f5e;
  }
  .category-tag.active {
    border-color: #f39c12;
    background: linear-gradient(135deg, #f39c12, #e67e22);
    color: #fff;
    box-shadow: 0 2px 8px rgba(243, 156, 18, 0.4);
    font-weight: 600;
  }
  .category-tag:active { transform: scale(0.92); }
  .wheel-wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
    margin: 6px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    touch-action: none;
    -webkit-touch-callout: none;
  }
  .wheel-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 380px;
    touch-action: none;
  }
  .wheel-container canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    border-radius: 50%;
    box-shadow: 0 4px 30px rgba(0,0,0,0.12), inset 0 2px 10px rgba(255,255,255,0.3);
  }
  .wheel-pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid #e74c3c;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
    z-index: 10;
    pointer-events: none;
  }
  .wheel-pointer::after {
    content: "";
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 12px;
    background: #e74c3c;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(231,76,60,0.5);
  }
  .spin-btn-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 14px 0 8px;
    display: flex;
    justify-content: center;
  }
  .spin-btn {
    padding: 14px 48px;
    border: none;
    border-radius: 28px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 3px;
    box-shadow: 0 4px 16px rgba(231,76,60,0.4);
  }
  .spin-btn:active { transform: scale(0.96); }
  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .spin-count {
    font-size: 12px;
    color: #b89880;
    text-align: center;
    margin-top: 4px;
  }
  .result-area {
    width: 100%;
    max-width: 420px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 6px 0 4px;

    background: #fff;
    border-radius: 16px;
    padding: 14px 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
    opacity: 0;
    transform: translateY(10px) scale(0.95);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 200px;
  }
  .result-card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .result-card .result-label {
    font-size: 12px;
    color: #b89880;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .result-card .result-name {
    font-size: 26px;
    font-weight: 800;
    color: #e74c3c;
    letter-spacing: 1px;
  }
  .result-card .result-emoji {
    font-size: 32px;
    display: block;
    margin-bottom: 4px;
  }
  .result-card .result-sub {
    font-size: 12px;
    color: #ccc;
    margin-top: 4px;
  }
  @keyframes pulse {
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.05)}
  }
  .spin-btn.spinning { animation: pulse 0.6s ease-in-out infinite; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-4px)}
    40%{transform:translateX(4px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
  }
  .result-card.shake { animation: shake 0.4s ease; }
  @media (max-width:380px){

  }

  }
</style>

function h2r(h){var x=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return x?{r:parseInt(x[1],16),g:parseInt(x[2],16),b:parseInt(x[3],16)}:{r:0,g:0,b:0}}
function isL(h){var c=h2r(h);return(c.r*299+c.g*587+c.b*114)/1000>160}
function lgt(h,p){var c=h2r(h),a=Math.round(2.55*p);return"rgb("+Math.min(255,c.r+a)+","+Math.min(255,c.g+a)+","+Math.min(255,c.b+a)+")"}
function sz(){var r=wc.getBoundingClientRect(),s=Math.min(r.width,380),d=window.devicePixelRatio||1;ca.width=s*d;ca.height=s*d;ca.style.width=s+"px";ca.style.height=s+"px";cx.scale(d,d);return s}
function draw(s,rd){
 var cx2=s/2,cy2=s/2,r=s/2-4,f=S.cur,n=f.length;cx.clearRect(0,0,s,s);
 if(!n){cx.save();cx.beginPath();cx.arc(cx2,cy2,r,0,Math.PI*2);cx.fillStyle="#f0ece8";cx.fill();cx.fillStyle="#bbb";cx.font=(s*0.05)+"px sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("暂无匹配食物",cx2,cy2);cx.restore();return}
 var sa=Math.PI*2/n,rr=rd*Math.PI/180;cx.save();cx.translate(cx2,cy2);cx.rotate(rr);
 for(var i=0;i<n;i++){var a=i*sa,b=a+sa,c=SC[i%SC.length];cx.beginPath();cx.moveTo(0,0);cx.arc(0,0,r,a,b);cx.closePath();var g=cx.createRadialGradient(0,0,r*0.15,0,0,r);g.addColorStop(0,lgt(c,25));g.addColorStop(1,c);cx.fillStyle=g;cx.fill();cx.strokeStyle="rgba(255,255,255,0.35)";cx.lineWidth=1.5;cx.stroke();
  var m=a+sa/2,tr=r*0.60,fs=Math.max(9.5,Math.min(13.5,s*0.037-(n>16?1.8:0))),nm=f[i].name,dn=nm.length>5?nm.slice(0,4)+"..":nm;
  cx.save();cx.rotate(m);cx.translate(tr,0);cx.rotate(Math.PI/2);var no=((m%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(no>Math.PI/2&&no<Math.PI*1.5){cx.rotate(Math.PI);cx.textAlign="right"}else{cx.textAlign="left"}
  cx.font="bold "+fs+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
  cx.fillStyle=isL(c)?"#2c3e50":"#ffffff";cx.shadowColor="rgba(0,0,0,0.12)";cx.shadowBlur=2;cx.fillText(dn,0,fs*0.35);cx.shadowBlur=0;cx.restore()}
 var cr=r*0.16,cd=cx.createRadialGradient(0,0,0,0,0,cr);cd.addColorStop(0,"#fff5f0");cd.addColorStop(1,"#f0d5c0");
 cx.beginPath();cx.arc(0,0,cr,0,Math.PI*2);cx.fillStyle=cd;cx.fill();cx.strokeStyle="#e0c0a8";cx.lineWidth=2;cx.stroke();
 cx.fillStyle="#8b6f5e";cx.font="bold "+(s*0.045)+'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 cx.textAlign="center";cx.textBaseline="middle";cx.fillText("吃",0,0);cx.restore()}
function filt(){var m=S.meal,f=FOODS.filter(function(x){return x.meals.indexOf(m)>=0});if(S.cats.size>0){f=f.filter(function(x){return x.cats.some(function(c){return S.cats.has(c)})})}for(var i=f.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=f[i];f[i]=f[j];f[j]=t}return f.slice(0,20)}
function gac(){var m=S.meal,mf=FOODS.filter(function(x){return x.meals.indexOf(m)>=0}),cs=new Set();mf.forEach(function(f){f.cats.forEach(function(c){cs.add(c)})});return CATS.filter(function(c){return cs.has(c)})}
function drawW(){var s=ca.width/(window.devicePixelRatio||1);if(s>0)draw(s,S.rot)}
function upd(){
 mt.forEach(function(t){t.classList.toggle("active",t.dataset.meal===S.meal)});
 ct.innerHTML="";var av=gac(),all=S.cats.size===0;
 var at=document.createElement("span");at.className="category-tag"+(all?" active":"");at.textContent="全部";
 at.addEventListener("click",function(){S.cats.clear();upd()});ct.appendChild(at);
 av.forEach(function(c){var t=document.createElement("span");var a=S.cats.has(c);t.className="category-tag"+(a?" active":"");t.textContent=c;
 t.addEventListener("click",function(){if(S.cats.has(c)){S.cats.delete(c)}else{S.cats.add(c)}upd()});ct.appendChild(t)});
 S.cur=filt();drawW();
 if(S.food){var ok=S.cur.some(function(f){return f.name===S.food.name});if(!ok){S.food=null;rc.classList.remove("show")}}
 sc.textContent=S.cnt>0?"已转 "+S.cnt+" 次":"";sb.disabled=S.cur.length===0||S.spin}
function spin(){
 if(S.spin||!S.cur.length)return;S.spin=true;sb.disabled=true;sb.classList.add("spinning");sb.textContent="🌀 旋转中...";rc.classList.remove("show");
 var n=S.cur.length,sd=360/n,ti=Math.floor(Math.random()*n),off=Math.random()*sd*0.8+sd*0.1;
 var tr=270-(ti*sd+off);tr=((tr%360)+360)%360;tr+=(5+Math.floor(Math.random()*5))*360;
 var cr=S.rot,tt=tr,ft=cr+tt,dr=3500+Math.random()*1500,st=performance.now();
 function ez(t){return 1-Math.pow(1-t,3)}
 function an(now){var e=now-st,p=Math.min(e/dr,1);S.rot=cr+tt*ez(p);drawW();if(p<1){requestAnimationFrame(an)}else{S.rot=ft;end()}}
 requestAnimationFrame(an)}
function end(){
 var n=S.cur.length,sd=360/n,nm=((270-(S.rot%360))+360)%360,idx=Math.min(Math.floor(nm/sd),n-1),fd=S.cur[idx];
 S.spin=false;sb.classList.remove("spinning");sb.textContent="转一转";sb.disabled=false;S.food=fd;S.cnt++;
 var mi=MMAP[S.meal];re.textContent=ge(fd.name);rl.textContent="今日"+mi.label+"推荐";rn.textContent=fd.name;
 rs.textContent="第 "+S.cnt+" 次转到的美味！";rc.classList.add("show");rc.classList.remove("shake");
 setTimeout(function(){rc.classList.add("shake")},50);drawW();sc.textContent="已转 "+S.cnt+" 次"}
function pr(e){e.preventDefault()}
function init(){
 function dr(){sz();drawW()}
 if(window.ResizeObserver){new ResizeObserver(dr).observe(wc)}
 window.addEventListener("resize",dr);setTimeout(dr,50);
 mt.forEach(function(t){t.addEventListener("click",function(){if(S.spin)return;S.meal=t.dataset.meal;S.cats.clear();S.food=null;rc.classList.remove("show");upd()})});
 sb.addEventListener("click",spin);
 ca.addEventListener("touchstart",pr,{passive:false});ca.addEventListener("touchmove",pr,{passive:false});ca.addEventListener("touchend",pr,{passive:false});ca.addEventListener("touchcancel",pr,{passive:false});
 wc.addEventListener("touchstart",pr,{passive:false});wc.addEventListener("touchmove",pr,{passive:false});
 upd()}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
})();
</script>
